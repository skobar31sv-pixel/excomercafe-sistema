<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EXCOMERCAFE - Control Agromercado</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="./styles.css?v=20260521-portal-v7">
</head>
<body>
  <main class="portal-shell">
    <section class="portal-head">
      <div>
        <span>EXCOMERCAFE</span>
        <h1>Control de venta en agro-mercado</h1>
      </div>
      <div class="portal-date" id="fecha-visible">--/--/----</div>
    </section>

    <section class="access-panel" id="access-panel">
      <h2>Acceso del agromercado</h2>
      <div class="form-grid">
        <label>
          Agromercado
          <select id="access-agromercado">
            <option value="">Seleccione...</option>
          </select>
        </label>
        <label>
          Clave
          <input id="access-clave" type="password" placeholder="Clave del agromercado">
        </label>
      </div>
      <button type="button" class="primary" onclick="validarAcceso()">Entrar</button>
      <p class="message" id="access-message"></p>
    </section>

    <form class="sales-form hidden" id="sales-form" onsubmit="enviarControl(event)">
      <section class="form-card">
        <div class="form-card-head">
          <div>
            <span id="agromercado-label">Agromercado</span>
            <h2>Hoja digital del vendedor</h2>
          </div>
          <div class="form-actions">
            <button type="button" class="ghost" onclick="imprimirHojaVendedor()">Imprimir / PDF</button>
            <button type="button" class="ghost" onclick="salirPortal()">Cambiar</button>
          </div>
        </div>

        <div class="form-grid compact">
          <label>Fecha<input id="fecha" type="date" readonly></label>
          <label>Encargado<input id="encargado" type="text" maxlength="80" placeholder="Nombre del encargado" required></label>
        </div>
      </section>

      <section class="form-card">
        <h2>Productos</h2>
        <div class="table-wrap">
          <table class="sales-table">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Inventario anterior</th>
                <th>Mercaderia nueva</th>
                <th>Venta</th>
                <th>Faltante</th>
                <th>Dañado</th>
                <th>Inventario final</th>
                <th>Total dinero</th>
              </tr>
            </thead>
            <tbody id="productos-body"></tbody>
          </table>
        </div>
      </section>

      <section class="form-card payment-card">
        <div class="form-grid compact">
          <label>Banco<select id="banco"><option value="">Pendiente</option><option>Agricola</option><option>Cuscatlan</option><option>Hipotecario</option><option>BAC</option><option>Promerica</option></select></label>
          <label>Gastos<input id="gastos" type="number" min="0" step="0.01" value="0" oninput="calcularTotales()"></label>
        </div>
      </section>

      <section class="totals">
        <div><span>Ventas</span><strong id="total-ventas">$0.00</strong></div>
        <div><span>Gastos</span><strong id="total-gastos">$0.00</strong></div>
        <div><span>Remesa</span><strong id="total-remesa">$0.00</strong></div>
      </section>

      <section class="form-card">
        <label>Observaciones<textarea id="observaciones" rows="4" placeholder="Notas del dia"></textarea></label>
        <button class="primary wide" type="submit">Enviar para revisión</button>
        <p class="message" id="submit-message"></p>
      </section>
    </form>
  </main>

  <script src="./app.js?v=20260521-portal-v7"></script>
</body>
</html>
